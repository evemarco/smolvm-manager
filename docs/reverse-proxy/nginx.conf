server {
    listen 80;
    listen [::]:80;
    server_name manager.lan;

    # Redirect HTTP to HTTPS (optional; remove if you want plain HTTP)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name manager.lan;

    # TLS certificates (managed outside this app)
    ssl_certificate /etc/ssl/certs/manager.lan.crt;
    ssl_certificate_key /etc/ssl/private/manager.lan.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for terminal endpoint
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Explicit terminal WebSocket path (included in / above, but shown for clarity)
    location /api/smolvm/machines/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
